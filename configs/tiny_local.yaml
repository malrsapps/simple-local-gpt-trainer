project:
  name: tiny_local_test
  input_text: data/input/corpus.txt
  output_dir: outputs/tiny_local_test

tokenizer:
  vocab_size: 4000
  min_frequency: 1

dataset:
  block_size: 128
  validation_ratio: 0.1

model:
  n_layer: 4
  n_head: 4
  n_embd: 256
  dropout: 0.1

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  max_steps: 1000
  warmup_steps: 50
